<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #38bdf8; }
    #hud { font-size: 1rem; margin-bottom: 0.6rem; display: flex; gap: 2rem; color: #94a3b8; }
    #hud span { color: #38bdf8; font-weight: bold; }
    canvas {
      border: 3px solid #38bdf8;
      border-radius: 4px;
      background: #0f172a;
      display: block;
    }
    #msg { margin-top: 0.8rem; font-size: 1.1rem; min-height: 1.5rem; }
    button {
      margin-top: 0.6rem;
      padding: 0.5rem 1.5rem;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      display: none;
    }
    button:hover { background: #0ea5e9; }
    a.back { margin-top: 1rem; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    a.back:hover { color: #38bdf8; }
    #hint { font-size: 0.85rem; color: #64748b; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <h1>🧱 Breakout</h1>
  <div id="hud">Score: <span id="score">0</span> &nbsp; Lives: <span id="lives">3</span></div>
  <canvas id="c" width="480" height="400"></canvas>
  <div id="msg">Click or press Space to start</div>
  <div id="hint">Move paddle with mouse or ←→ arrow keys</div>
  <button id="restart">Play Again</button>
  <a class="back" href="../index.html">← Back to Games</a>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const msgEl = document.getElementById('msg');
    const restartBtn = document.getElementById('restart');

    const W = canvas.width, H = canvas.height;
    const PADDLE_W = 80, PADDLE_H = 10, PADDLE_Y = H - 30;
    const BALL_R = 7;
    const ROWS = 5, COLS = 10, BRICK_W = 44, BRICK_H = 16;
    const BRICK_PAD = 4, BRICK_OFFSET_X = 12, BRICK_OFFSET_Y = 40;
    const COLORS = ['#f87171','#fb923c','#facc15','#4ade80','#38bdf8'];

    let paddle, ball, bricks, score, lives, started, raf, keys;

    function init() {
      paddle = { x: W / 2 - PADDLE_W / 2, y: PADDLE_Y, w: PADDLE_W };
      ball = { x: W / 2, y: PADDLE_Y - BALL_R - 2, vx: 3, vy: -4 };
      bricks = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          bricks.push({
            x: BRICK_OFFSET_X + c * (BRICK_W + BRICK_PAD),
            y: BRICK_OFFSET_Y + r * (BRICK_H + BRICK_PAD),
            alive: true, color: COLORS[r]
          });
        }
      }
      score = 0;
      lives = 3;
      started = false;
      keys = {};
      scoreEl.textContent = '0';
      livesEl.textContent = '3';
      msgEl.textContent = 'Click or press Space to start';
      restartBtn.style.display = 'none';
      cancelAnimationFrame(raf);
      draw();
    }

    function startGame() {
      if (!started) {
        started = true;
        msgEl.textContent = '';
        loop();
      }
    }

    function loop() {
      update();
      draw();
      raf = requestAnimationFrame(loop);
    }

    function update() {
      // Paddle movement
      if (keys['ArrowLeft']) paddle.x = Math.max(0, paddle.x - 5);
      if (keys['ArrowRight']) paddle.x = Math.min(W - paddle.w, paddle.x + 5);

      ball.x += ball.vx;
      ball.y += ball.vy;

      // Wall bounces
      if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx *= -1; }
      if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx *= -1; }
      if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy *= -1; }

      // Paddle collision
      if (ball.y + BALL_R >= paddle.y && ball.y - BALL_R <= paddle.y + PADDLE_H &&
          ball.x >= paddle.x && ball.x <= paddle.x + paddle.w && ball.vy > 0) {
        const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        ball.vx = hit * 5;
        ball.vy = -Math.abs(ball.vy);
      }

      // Out of bottom
      if (ball.y - BALL_R > H) {
        lives--;
        livesEl.textContent = lives;
        if (lives <= 0) {
          endGame(false);
          return;
        }
        ball.x = paddle.x + paddle.w / 2;
        ball.y = PADDLE_Y - BALL_R - 2;
        ball.vx = 3 * (Math.random() > 0.5 ? 1 : -1);
        ball.vy = -4;
        started = false;
        cancelAnimationFrame(raf);
        msgEl.textContent = 'Click or Space to continue';
      }

      // Brick collisions
      for (const b of bricks) {
        if (!b.alive) continue;
        if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + BRICK_W &&
            ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + BRICK_H) {
          b.alive = false;
          score += 10;
          scoreEl.textContent = score;
          const overlapLeft = ball.x + BALL_R - b.x;
          const overlapRight = b.x + BRICK_W - (ball.x - BALL_R);
          const overlapTop = ball.y + BALL_R - b.y;
          const overlapBottom = b.y + BRICK_H - (ball.y - BALL_R);
          const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
          if (minOverlap === overlapTop || minOverlap === overlapBottom) ball.vy *= -1;
          else ball.vx *= -1;
          break;
        }
      }

      if (bricks.every(b => !b.alive)) endGame(true);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Bricks
      bricks.forEach(b => {
        if (!b.alive) return;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, BRICK_W, BRICK_H, 3);
        ctx.fill();
      });

      // Paddle
      ctx.fillStyle = '#38bdf8';
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.w, PADDLE_H, 5);
      ctx.fill();

      // Ball
      ctx.fillStyle = '#f1f5f9';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
    }

    function endGame(won) {
      cancelAnimationFrame(raf);
      msgEl.textContent = won ? '🎉 You cleared all bricks!' : '💀 Game Over!';
      restartBtn.style.display = 'inline-block';
    }

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      paddle.x = e.clientX - rect.left - paddle.w / 2;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    });
    canvas.addEventListener('click', startGame);
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ') { e.preventDefault(); startGame(); }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });
    restartBtn.addEventListener('click', init);

    init();
  </script>
</body>
</html>
