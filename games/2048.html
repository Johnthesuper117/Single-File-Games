<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      user-select: none;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.3rem; color: #fbbf24; }
    #hud { display: flex; gap: 1.5rem; margin-bottom: 0.8rem; font-size: 1rem; }
    .box { background: #16213e; border-radius: 8px; padding: 0.4rem 1rem; text-align: center; }
    .box label { display: block; font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .box span { font-size: 1.3rem; font-weight: bold; color: #fbbf24; }
    #grid {
      background: #334155;
      padding: 8px;
      border-radius: 10px;
      display: grid;
      grid-template-columns: repeat(4, 90px);
      grid-template-rows: repeat(4, 90px);
      gap: 8px;
    }
    .tile {
      width: 90px; height: 90px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.8rem;
      transition: background 0.1s;
    }
    .t0    { background: #1e293b; }
    .t2    { background: #eee4da; color: #776e65; }
    .t4    { background: #ede0c8; color: #776e65; }
    .t8    { background: #f2b179; color: #f9f6f2; }
    .t16   { background: #f59563; color: #f9f6f2; }
    .t32   { background: #f67c5f; color: #f9f6f2; }
    .t64   { background: #f65e3b; color: #f9f6f2; }
    .t128  { background: #edcf72; color: #f9f6f2; font-size: 1.5rem; }
    .t256  { background: #edcc61; color: #f9f6f2; font-size: 1.5rem; }
    .t512  { background: #edc850; color: #f9f6f2; font-size: 1.5rem; }
    .t1024 { background: #edc53f; color: #f9f6f2; font-size: 1.2rem; }
    .t2048 { background: #edc22e; color: #f9f6f2; font-size: 1.2rem; }
    .thigh { background: #3d1a78; color: #f9f6f2; font-size: 1rem; }
    #msg { margin-top: 0.8rem; font-size: 1.1rem; min-height: 1.5rem; }
    button {
      margin-top: 0.8rem;
      padding: 0.5rem 1.5rem;
      background: #fbbf24;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #f59e0b; }
    #hint { font-size: 0.85rem; color: #64748b; margin-top: 0.3rem; }
    a.back { margin-top: 1rem; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    a.back:hover { color: #fbbf24; }
  </style>
</head>
<body>
  <h1>2048</h1>
  <div id="hud">
    <div class="box"><label>Score</label><span id="score">0</span></div>
    <div class="box"><label>Best</label><span id="best">0</span></div>
  </div>
  <div id="grid"></div>
  <div id="msg"></div>
  <div id="hint">Use arrow keys or swipe to merge tiles</div>
  <button id="restart">New Game</button>
  <a class="back" href="../index.html">← Back to Games</a>

  <script>
    const gridEl = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const msgEl = document.getElementById('msg');

    let board, score, best, over, won;

    function init() {
      board = Array.from({ length: 4 }, () => Array(4).fill(0));
      score = 0;
      over = false;
      won = false;
      best = parseInt(localStorage.getItem('2048best') || '0');
      bestEl.textContent = best;
      scoreEl.textContent = '0';
      msgEl.textContent = '';
      addTile();
      addTile();
      render();
    }

    function addTile() {
      const empty = [];
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
          if (!board[r][c]) empty.push([r, c]);
      if (!empty.length) return;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function tileClass(v) {
      if (!v) return 't0';
      if (v > 2048) return 'thigh';
      return 't' + v;
    }

    function render() {
      gridEl.innerHTML = '';
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          const v = board[r][c];
          const div = document.createElement('div');
          div.className = 'tile ' + tileClass(v);
          div.textContent = v || '';
          gridEl.appendChild(div);
        }
      }
    }

    function compress(row) {
      const vals = row.filter(v => v);
      const merged = [];
      let gained = 0;
      let i = 0;
      while (i < vals.length) {
        if (i + 1 < vals.length && vals[i] === vals[i + 1]) {
          merged.push(vals[i] * 2);
          gained += vals[i] * 2;
          i += 2;
        } else {
          merged.push(vals[i]);
          i++;
        }
      }
      while (merged.length < 4) merged.push(0);
      return { row: merged, gained };
    }

    function move(dir) {
      if (over) return;
      let moved = false;
      let totalGained = 0;

      const transform = {
        left:  { get: (r,c) => [r,c],   set: (r,c,v) => board[r][c] = v },
        right: { get: (r,c) => [r,3-c], set: (r,c,v) => board[r][3-c] = v },
        up:    { get: (r,c) => [c,r],   set: (r,c,v) => board[c][r] = v },
        down:  { get: (r,c) => [3-c,r], set: (r,c,v) => board[3-c][r] = v },
      }[dir];

      for (let r = 0; r < 4; r++) {
        const row = [0,1,2,3].map(c => board[transform.get(r,c)[0]][transform.get(r,c)[1]]);
        const { row: newRow, gained } = compress(row);
        newRow.forEach((v, c) => {
          const [gr, gc] = transform.get(r, c);
          if (board[gr][gc] !== v) moved = true;
          transform.set(r, c, v);
        });
        totalGained += gained;
      }

      if (moved) {
        score += totalGained;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('2048best', best);
        }
        addTile();
        render();
        if (!won && board.some(row => row.includes(2048))) {
          won = true;
          msgEl.textContent = '🎉 You reached 2048! Keep going or restart.';
        }
        if (!hasMove()) {
          over = true;
          msgEl.textContent = '💀 No more moves! Game Over.';
        }
      }
    }

    function hasMove() {
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++) {
          if (!board[r][c]) return true;
          if (c < 3 && board[r][c] === board[r][c+1]) return true;
          if (r < 3 && board[r][c] === board[r+1][c]) return true;
        }
      return false;
    }

    document.addEventListener('keydown', e => {
      const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
      if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
    });

    // Touch swipe
    let touchX, touchY;
    document.addEventListener('touchstart', e => {
      touchX = e.touches[0].clientX;
      touchY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchX;
      const dy = e.changedTouches[0].clientY - touchY;
      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
      else move(dy > 0 ? 'down' : 'up');
    }, { passive: true });

    document.getElementById('restart').addEventListener('click', init);
    init();
  </script>
</body>
</html>
