<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Single-File Games</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #1e293b;
      padding: 2.5rem 1rem 2rem;
      text-align: center;
    }
    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(90deg, #a78bfa, #38bdf8, #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 0.6rem;
      color: #64748b;
      font-size: 1.05rem;
    }

    /* ── Search ── */
    #search-wrap {
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem 0.5rem;
    }
    #search {
      width: 100%;
      max-width: 400px;
      padding: 0.65rem 1.1rem;
      background: #1e293b;
      border: 1.5px solid #334155;
      border-radius: 999px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: #475569; }
    #search:focus { border-color: #818cf8; }

    /* ── Game Grid ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.2rem 3rem;
    }
    #game-count {
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 1.2rem;
      text-align: center;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    /* ── Game Card ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
    }
    .card-banner {
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      flex-shrink: 0;
    }
    .card-body {
      padding: 1rem 1.1rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f1f5f9;
    }
    .card-desc {
      font-size: 0.88rem;
      color: #94a3b8;
      line-height: 1.45;
      flex: 1;
    }
    .card-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .tag {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: #0f172a;
      color: #64748b;
      border: 1px solid #334155;
    }
    .play-btn {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.45rem 1.1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      transition: filter 0.15s;
      text-decoration: none;
      color: #0f172a;
    }
    .play-btn:hover { filter: brightness(1.1); }

    /* ── Accent colours per card ── */
    .accent-purple .card-banner { background: linear-gradient(135deg, #2e1065, #4c1d95); }
    .accent-purple .play-btn   { background: #a78bfa; }
    .accent-purple:hover       { border-color: #a78bfa; }

    .accent-green .card-banner  { background: linear-gradient(135deg, #052e16, #14532d); }
    .accent-green .play-btn    { background: #4ade80; }
    .accent-green:hover        { border-color: #4ade80; }

    .accent-orange .card-banner { background: linear-gradient(135deg, #431407, #7c2d12); }
    .accent-orange .play-btn   { background: #fb923c; }
    .accent-orange:hover       { border-color: #fb923c; }

    .accent-sky .card-banner    { background: linear-gradient(135deg, #082f49, #0c4a6e); }
    .accent-sky .play-btn      { background: #38bdf8; }
    .accent-sky:hover          { border-color: #38bdf8; }

    .accent-yellow .card-banner { background: linear-gradient(135deg, #422006, #713f12); }
    .accent-yellow .play-btn   { background: #fbbf24; }
    .accent-yellow:hover       { border-color: #fbbf24; }

    .accent-pink .card-banner   { background: linear-gradient(135deg, #2e0a3a, #581c87); }
    .accent-pink .play-btn     { background: #e879f9; }
    .accent-pink:hover         { border-color: #e879f9; }

    /* ── Empty state ── */
    #empty {
      display: none;
      text-align: center;
      color: #475569;
      padding: 3rem 1rem;
      font-size: 1.05rem;
      grid-column: 1 / -1;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: #334155;
      font-size: 0.85rem;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎮 Single-File Games</h1>
    <p>Classic browser games — each one a single HTML file, no installs needed.</p>
  </header>

  <div id="search-wrap">
    <input id="search" type="search" placeholder="Search games…" aria-label="Search games" />
  </div>

  <main>
    <p id="game-count"></p>
    <div id="grid"></div>
    <div id="empty">No games matched your search.</div>
  </main>

  <footer>
    Single-File Games · Each game is a self-contained HTML file
  </footer>

  <script>
    const ACCENTS = ['accent-green', 'accent-purple', 'accent-orange', 'accent-sky', 'accent-yellow', 'accent-pink'];
    const DEFAULT_DESC = 'Single-file browser game.';
    const gridEl = document.getElementById('grid');
    const searchEl = document.getElementById('search');
    const gameCountEl = document.getElementById('game-count');
    const emptyEl = document.getElementById('empty');
    let cards = [];

    function formatName(fileName) {
      const name = fileName.replace(/\.html$/i, '').replace(/[-_]+/g, ' ');
      return name.replace(/\b\w/g, char => char.toUpperCase());
    }

    function chooseEmoji(name) {
      const lower = name.toLowerCase();
      if (lower.includes('snake')) return '🐍';
      if (lower.includes('tic')) return '⭕';
      if (lower.includes('memory')) return '🃏';
      if (lower.includes('breakout')) return '🧱';
      if (lower.includes('mine')) return '💣';
      if (lower.includes('2048')) return '🔢';
      return '🎮';
    }

    async function parseGameTitleAndDescription(fileName) {
      try {
        const res = await fetch(`games/${encodeURIComponent(fileName)}`);
        if (!res.ok) return { title: formatName(fileName), desc: DEFAULT_DESC };
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const title = (doc.title || '').trim() || formatName(fileName);
        const metaDesc = (doc.querySelector('meta[name="description"]')?.content || '').trim();
        return {
          title,
          desc: metaDesc || DEFAULT_DESC,
        };
      } catch {
        return { title: formatName(fileName), desc: DEFAULT_DESC };
      }
    }

    async function listGameFiles() {
      try {
        const res = await fetch('games/');
        if (!res.ok) return [];
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const links = Array.from(doc.querySelectorAll('a[href]'))
          .map(link => link.getAttribute('href') || '')
          .map(href => href.split('#')[0].split('?')[0])
          .map(href => decodeURIComponent(href.trim()))
          .map(href => href.replace(/\/+$/, ''))
          .map(href => href.split('/').pop() || '')
          .filter(name => /\.html$/i.test(name));
        return Array.from(new Set(links)).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
      } catch {
        return [];
      }
    }

    function createCard(game, i) {
      const card = document.createElement('a');
      card.className = `card ${ACCENTS[i % ACCENTS.length]}`;
      card.href = `games/${game.file}`;

      const banner = document.createElement('div');
      banner.className = 'card-banner';
      banner.textContent = chooseEmoji(game.title);

      const body = document.createElement('div');
      body.className = 'card-body';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = game.title;

      const desc = document.createElement('div');
      desc.className = 'card-desc';
      desc.textContent = game.desc;

      const meta = document.createElement('div');
      meta.className = 'card-meta';

      const tagSingleFile = document.createElement('span');
      tagSingleFile.className = 'tag';
      tagSingleFile.textContent = 'Single-file';
      meta.appendChild(tagSingleFile);

      const tagHtml = document.createElement('span');
      tagHtml.className = 'tag';
      tagHtml.textContent = 'HTML';
      meta.appendChild(tagHtml);

      const button = document.createElement('span');
      button.className = 'play-btn';
      button.textContent = '▶ Play';

      body.append(title, desc, meta, button);
      card.append(banner, body);
      return card;
    }

    async function renderCards() {
      const files = await listGameFiles();
      const games = await Promise.all(
        files.map(async file => {
          const details = await parseGameTitleAndDescription(file);
          return { file, ...details };
        })
      );

      gridEl.innerHTML = '';
      games.forEach((game, i) => gridEl.appendChild(createCard(game, i)));
      cards = Array.from(document.querySelectorAll('.card'));
    }

    function updateCount(n) {
      gameCountEl.textContent = n === cards.length
        ? `${n} games available`
        : `${n} of ${cards.length} games`;
    }

    function filterCards(query) {
      const q = query.trim().toLowerCase();
      let shown = 0;
      cards.forEach(card => {
        const text = card.textContent.toLowerCase();
        const visible = !q || text.includes(q);
        card.style.display = visible ? '' : 'none';
        if (visible) shown++;
      });
      emptyEl.style.display = shown === 0 ? 'block' : 'none';
      updateCount(shown);
    }

    searchEl.addEventListener('input', e => filterCards(e.target.value));

    (async function init() {
      await renderCards();
      filterCards('');
      if (cards.length === 0) {
        emptyEl.style.display = 'block';
        emptyEl.textContent = 'No game files were found in /games. Run this through a local web server so folder listing can be read.';
      }
    })();
  </script>
</body>
</html>
